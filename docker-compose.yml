# 풀스택 (web + api + db) — 한 번에 배포
# 사용:
#   cp .env.docker.example .env       # SECRET_KEY, POSTGRES_PASSWORD 등 수정
#   docker compose up -d --build --remove-orphans
#
#   web  http://localhost:9000  (브라우저는 same-origin /api/* 만 호출 → CORS 불필요)
#   api  http://localhost:9001  (web 컨테이너가 내부망 api:9001 로 프록시)
#
# 프로덕션:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# 백엔드만:  cd backend && docker compose up -d
#
# ⚠️ db·api 정의는 backend/docker-compose.yml 과 동일하게 유지(동기화)할 것.

services:
  db:
    image: postgres:16-alpine
    container_name: bomibot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bomibot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bomibot}
      POSTGRES_DB: ${POSTGRES_DB:-bomibot}
    volumes:
      - bomibot_pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-bomibot} -d ${POSTGRES_DB:-bomibot}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bomibot-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-9001}:9001"
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-bomibot}:${POSTGRES_PASSWORD:-bomibot}@db:5432/${POSTGRES_DB:-bomibot}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me-in-docker}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      CORS_ORIGIN_REGEX: ${CORS_ORIGIN_REGEX:-}
      CORS_ALLOW_VERCEL_REGEX: ${CORS_ALLOW_VERCEL_REGEX:-true}
      CORS_ALLOW_BOMI_REGEX: ${CORS_ALLOW_BOMI_REGEX:-true}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-api-workspace.bomi.ai.kr,localhost,127.0.0.1}
      AUTO_CREATE_TABLES: ${AUTO_CREATE_TABLES:-true}
      RUN_ALEMBIC_ON_STARTUP: ${RUN_ALEMBIC_ON_STARTUP:-true}
      RUN_SEED_ON_STARTUP: ${RUN_SEED_ON_STARTUP:-true}
      SEED_MISSING_JSON_ON_STARTUP: ${SEED_MISSING_JSON_ON_STARTUP:-true}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      CS_EMAIL_TO: ${CS_EMAIL_TO:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://factchat-cloud.mindlogic.ai/v1/gateway}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      RAG_API_URL: ${RAG_API_URL:-}
      RAG_API_KEY: ${RAG_API_KEY:-}
      RAG_TOP_K: ${RAG_TOP_K:-8}
      FILES_STORAGE_DIR: /app/storage/uploads
      # rhwp 렌더러 경로 (이미지에 /usr/local/bin/rhwp 로 COPY 됨, PATH 상에도 있음)
      RHWP_BIN: ${RHWP_BIN:-/usr/local/bin/rhwp}
    volumes:
      - bomibot_uploads:/app/storage/uploads
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

  web:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* 는 빌드 타임에 구워짐(아래 값 변경 시 --build 필요)
        NEXT_PUBLIC_USE_API_PROXY: "true"
        NEXT_PUBLIC_USE_MOCK_API: "false"
        NEXT_PUBLIC_COLLABORATION_ENABLED: ${NEXT_PUBLIC_COLLABORATION_ENABLED:-false}
    container_name: bomibot-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-9000}:9000"
    environment:
      NODE_ENV: production
      PORT: "9000"
      HOSTNAME: 0.0.0.0
      # 브라우저 same-origin /api/* → Next 서버가 내부망 FastAPI 로 프록시 (런타임, 재빌드 불필요)
      API_PROXY_URL: ${API_PROXY_URL:-http://api:9001}
      # 프론트 서버사이드 LLM/메일 (lib/chat/*) — 미설정 시 해당 기능만 비활성
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://factchat-cloud.mindlogic.ai/v1/gateway}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      SMTP_SERVICE: ${SMTP_SERVICE:-gmail}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      CS_EMAIL_TO: ${CS_EMAIL_TO:-}

volumes:
  bomibot_pgdata:
  bomibot_uploads:
