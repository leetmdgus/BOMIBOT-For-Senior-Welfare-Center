# /etc/nginx/sites-available/bomibot-api
# api-workspace.bomi.ai.kr → 127.0.0.1:9001 (Docker api 컨테이너)

upstream bomibot_api {
    server 127.0.0.1:9001;
    keepalive 32;
}

server {
    listen 80;
    server_name api-workspace.bomi.ai.kr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api-workspace.bomi.ai.kr;

    # certbot --nginx -d api-workspace.bomi.ai.kr
    ssl_certificate     /etc/letsencrypt/live/api-workspace.bomi.ai.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-workspace.bomi.ai.kr/privkey.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://bomibot_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # CORS는 FastAPI에서 처리 — Nginx에서 추가하지 않음
    }
}
