# /etc/nginx/sites-available/bomibot-web
# bomibot.bomi.ai.kr → 127.0.0.1:9000 (Docker web/Next 컨테이너)
#
# 핵심: /api/* 도 9000(Next)으로 보낸다. Next 서버가 same-origin /api/* 를
#       내부망 api:9001 로 프록시하면서 /api/* → /api/v1/* 로 rewrite 한다.
#       (frontend-next/lib/api-proxy.ts, docker-compose.yml 의 설계 의도)
#       → nginx 에서 /api/ 를 9001 로 직접 빼면 prefix(/api/v1) 불일치로 전부 404.

# WebSocket/keep-alive 안전 처리 (Connection "upgrade" 하드코딩 대신 사용)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name bomibot.bomi.ai.kr;

    # ── HTTPS 적용 시 (권장) ──────────────────────────────────────
    # certbot --nginx -d bomibot.bomi.ai.kr 로 인증서 발급 후,
    # 위 listen 80 블록은 아래 리다이렉트로 바꾸고 listen 443 블록을 사용:
    #   return 301 https://$host$request_uri;
    # 그리고 별도 server { listen 443 ssl http2; ... } 에 아래 location 을 둔다.
    #   ssl_certificate     /etc/letsencrypt/live/bomibot.bomi.ai.kr/fullchain.pem;
    #   ssl_certificate_key /etc/letsencrypt/live/bomibot.bomi.ai.kr/privkey.pem;
    # ──────────────────────────────────────────────────────────────

    # 파일 업로드. frontend-next/next.config.mjs 의 proxyClientMaxBodySize=50mb 와 맞춤
    # (기본 1m 면 1MB 초과 업로드가 413 으로 거부됨)
    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:9000;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / 업그레이드 (HMR·향후 WS 대비)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 긴 응답/스트리밍 대비
        proxy_read_timeout 300s;
        proxy_buffering    off;
    }
}
