# 로컬 / 서버 공통 — API + PostgreSQL
# 사용: docker compose up -d --build // --remove-orphans
# API: http://127.0.0.1:9001  |  DB 호스트 포트 기본 5433 (5432 충돌 방지)

services:
  db:
    image: postgres:16-alpine
    container_name: bomibot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bomibot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bomibot}
      POSTGRES_DB: ${POSTGRES_DB:-bomibot}
    volumes:
      - bomibot_pgdata:/var/lib/postgresql/data
    # API는 내부망 db:5432 로 접속. 호스트 매핑은 DBeaver 등 외부 접속용(5432 점유 시 5433 사용)
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-bomibot} -d ${POSTGRES_DB:-bomibot}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bomibot-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-9001}:9001"
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-bomibot}:${POSTGRES_PASSWORD:-bomibot}@db:5432/${POSTGRES_DB:-bomibot}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me-in-docker}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      CORS_ORIGIN_REGEX: ${CORS_ORIGIN_REGEX:-}
      CORS_ALLOW_VERCEL_REGEX: ${CORS_ALLOW_VERCEL_REGEX:-true}
      CORS_ALLOW_BOMI_REGEX: ${CORS_ALLOW_BOMI_REGEX:-true}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-api-workspace.bomi.ai.kr,localhost,127.0.0.1}
      AUTO_CREATE_TABLES: ${AUTO_CREATE_TABLES:-true}
      RUN_ALEMBIC_ON_STARTUP: ${RUN_ALEMBIC_ON_STARTUP:-true}
      RUN_SEED_ON_STARTUP: ${RUN_SEED_ON_STARTUP:-true}
      SEED_MISSING_JSON_ON_STARTUP: ${SEED_MISSING_JSON_ON_STARTUP:-true}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      CS_EMAIL_TO: ${CS_EMAIL_TO:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://factchat-cloud.mindlogic.ai/v1/gateway}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      RAG_API_URL: ${RAG_API_URL:-}
      RAG_API_KEY: ${RAG_API_KEY:-}
      RAG_TOP_K: ${RAG_TOP_K:-8}
      FILES_STORAGE_DIR: /app/storage/uploads
    volumes:
      # 업로드·HWPX 동기화 바이너리 — 볼륨 없으면 컨테이너 재빌드 시 DB만 남고 본문 404
      - bomibot_uploads:/app/storage/uploads
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

volumes:
  bomibot_pgdata:
  bomibot_uploads:
